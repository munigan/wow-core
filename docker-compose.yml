services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: wow
      POSTGRES_PASSWORD: wow
      POSTGRES_DB: wow_core
    volumes:
      - pgdata:/var/lib/postgresql/data

  crawl4ai:
    image: unclecode/crawl4ai:0.8.0
    ports:
      - "11235:11235"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    shm_size: 2g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11235/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
